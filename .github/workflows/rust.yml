name: Rust
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  RUST_TOOLCHAIN_VERSION: stable

permissions:
  contents: read

jobs:
  lint-rust:
    name: Lint with Clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        manifest:
          - native/arrow_format_nif/Cargo.toml

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "${{ env.RUST_TOOLCHAIN_VERSION }}"
          components: clippy

      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          env-vars: "RUST_TOOLCHAIN_VERSION"
          workspaces: |
            native/arrow_format_nif

      - name: Run Clippy
        run: cargo clippy --manifest-path=${{ matrix.manifest }} -- -Dwarnings

  fmt-rust:
    name: Check Formatting with rustfmt
    runs-on: ubuntu-latest
    strategy:
      matrix:
        manifest:
          - native/arrow_format_nif/Cargo.toml

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "${{ env.RUST_TOOLCHAIN_VERSION }}"
          components: rustfmt

      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          env-vars: "RUST_TOOLCHAIN_VERSION"
          workspaces: |
            native/arrow_format_nif

      - name: run rustfmt
        run: cargo fmt --manifest-path=${{ matrix.manifest }} --all -- --check

  test-rust:
    name: Run unittests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        manifest:
          - native/arrow_format_nif/Cargo.toml

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "${{ env.RUST_TOOLCHAIN_VERSION }}"
          components: rustfmt

      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          env-vars: "RUST_TOOLCHAIN_VERSION"
          workspaces: |
            native/arrow_format_nif

      - name: run cargo test
        run: cargo test --manifest-path=${{ matrix.manifest }}
